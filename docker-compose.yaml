services:
  catalogue:
    build: 
    context: ./catalogue
    dockerfile: Dockerfile
    image: joindevops/catalogue:1.0.0
    container_name: catalogue
    depends_on:
    - mongodb
  mongodb:
    build: 
    context: ./mongodb
    dockerfile: Dockerfile
    image: joindevops/mongodb:1.0.0
    container_name: mongodb
   
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, you need to create network manually
